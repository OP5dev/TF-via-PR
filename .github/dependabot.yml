---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: daily
    cooldown:
      semver-major-days: 3
      semver-minor-days: 2
      semver-patch-days: 2
    groups:
      actions-toolkit:
        patterns:
          - "@actions/*"

